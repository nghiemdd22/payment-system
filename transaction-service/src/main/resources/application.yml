server:
  port: 8083

spring:
  application:
    name: transaction-service

  # Cấu hình Database (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/transaction_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Tự động tạo/cập nhật bảng dựa trên Entity
    show-sql: true     # Bật lên để xem SQL log khi test
    properties:
      hibernate:
        format_sql: true

  # Cấu hình Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms  # Thời gian chờ tối đa khi kết nối
      # password:       # Bỏ comment dòng này nếu Redis Docker của bạn có cài pass

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.payment
        spring.json.use.type.headers: true
        spring.json.type.mapping: com.payment.wallet_service.event.TransferCompletedEvent:com.payment.transaction_service.event.TransferCompletedEvent,com.payment.wallet_service.event.TransferRollbackCompletedEvent:com.payment.transaction_service.event.TransferRollbackCompletedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

  cloud:
    openfeign:
      client:
        config:
          walletServiceClient:
            connectTimeout: 2000
            readTimeout: 5000
            loggerLevel: basic

wallet-service:
  base-url: http://localhost:8082

app:
  kafka:
    topics:
      transfer-requested: txn.transfer.requested
      transfer-completed: txn.transfer.completed
      transfer-rollback-requested: txn.transfer.rollback.requested
      transfer-rollback-completed: txn.transfer.rollback.completed

