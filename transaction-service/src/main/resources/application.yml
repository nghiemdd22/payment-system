server:
  port: 8083

spring:
  application:
    name: transaction-service

  # Cấu hình Database (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/transaction_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Tự động tạo/cập nhật bảng dựa trên Entity
    show-sql: true     # Bật lên để xem SQL log khi test
    properties:
      hibernate:
        format_sql: true

  # Cấu hình Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms  # Thời gian chờ tối đa khi kết nối
      # password:       # Bỏ comment dòng này nếu Redis Docker của bạn có cài pass

  cloud:
    openfeign:
      client:
        config:
          walletServiceClient:
            connectTimeout: 2000
            readTimeout: 5000
            loggerLevel: basic

wallet-service:
  base-url: http://localhost:8082

