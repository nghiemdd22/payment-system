server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      # 1. Cấu hình CORS mở cửa cho Frontend (Phiên bản mới)
      server:
        webflux:
          globalcors:
            cors-configurations: # LƯU Ý: Có dấu gạch ngang ở giữa
              '[/**]':
                allowedOrigins: "*" 
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
      
      # 2. Cấu hình Routes (LƯU Ý: Chữ 'routes' phải nằm ngang hàng với chữ 'server' ở trên)
      routes:
        # Tuyến đường 1: Identity Service (Xác thực & Chống DDoS)
        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
          
        # Tuyến đường 2: Wallet Service (Xem số dư)
        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/wallets/**
          filters:
            # Thêm Khiên bảo vệ cho Wallet Service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # Tuyến đường 3: Transaction Service (Thực hiện giao dịch)
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            # Thêm Khiên bảo vệ cho Transaction Service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
jwt:
  public-key: ""